{% extends 'core/base.html' %}
{% block title %}Configuración - Líneas{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4">
    <h1 class="text-3xl font-bold text-slate-800 mb-8">Líneas</h1>
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Extrusora</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                {% for linea in lineas %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm">{{ linea.id }}</td>
                    <td class="px-6 py-4 text-sm font-medium">{{ linea.nombre }}</td>
                    <td class="px-6 py-4 text-sm">{{ linea.extrusora.nombre }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">No hay líneas</td></tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
</div>
{% endblock %}
