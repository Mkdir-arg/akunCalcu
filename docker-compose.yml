services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: akuna_calc
      MYSQL_USER: akuna
      MYSQL_PASSWORD: akuna123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3308:3306"
    command: >
      --innodb-buffer-pool-size=128M
      --innodb-log-file-size=32M
      --innodb-flush-method=O_DSYNC
      --innodb-flush-log-at-trx-commit=1
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      DB_NAME: akuna_calc
      DB_USER: akuna
      DB_PASSWORD: akuna123
      DB_HOST: db
      DB_PORT: 3306
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DJANGO_SUPERUSER_PASSWORD: admin123
      DEBUG: "true"
      TELEGRAM_BOT_SECRET: "akuna-bot-secret-2024"
    depends_on:
      - db
    volumes:
      - ./akuna_calc:/app

  n8n:
    image: n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=https://mya-hypernatural-dalton.ngrok-free.dev
      - N8N_EDITOR_BASE_URL=https://mya-hypernatural-dalton.ngrok-free.dev
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=akuna-evolution-key-2026
      - TELEGRAM_BOT_SECRET=akuna-bot-secret-2024
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
    volumes:
      - n8n_data:/home/node/.n8n

  evolution-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pwd_2026
      POSTGRES_DB: evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - evolution_redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - evolution-postgres
      - evolution-redis
    environment:
      - SERVER_URL=http://evolution-api:8080
      - AUTHENTICATION_API_KEY=akuna-evolution-key-2026
      - LANGUAGE=es
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_pwd_2026@evolution-postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_akuna
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution_akuna
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      - LOG_LEVEL=ERROR,WARN,DEBUG,LOG,INFO,VERBOSE
      - LOG_COLOR=true
      - DEL_INSTANCE=false
      - WEBHOOK_GLOBAL_ENABLED=false
      - QRCODE_LIMIT=30
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1023249347
      - CONFIG_SESSION_PHONE_CLIENT=Akuna
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evolution_instances:/evolution/instances

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml
    ports:
      - 4040:4040

volumes:
  mysql_data:
  n8n_data:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances:
