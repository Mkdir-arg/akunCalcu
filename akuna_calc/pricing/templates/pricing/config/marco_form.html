{% extends 'core/base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">{{ titulo }}</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6">
        <form method="post">
            {% csrf_token %}
            <div class="grid grid-cols-1 gap-6">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
                <a href="{% url 'config-marcos' %}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-2xl font-semibold">Cancelar</a>
                <button type="submit" class="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white px-6 py-3 rounded-2xl font-semibold">
                    <i class="fas fa-save mr-2"></i>Guardar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const extrusoraSelect = document.getElementById('id_extrusora');
    const lineaSelect = document.getElementById('id_linea');
    const productoSelect = document.getElementById('id_producto');

    if (!extrusoraSelect || !lineaSelect || !productoSelect) {
        return;
    }

    const setOptions = (select, items, placeholder, selectedValue, textKey) => {
        select.innerHTML = '';
        const placeholderOption = document.createElement('option');
        placeholderOption.value = '';
        placeholderOption.textContent = placeholder;
        select.appendChild(placeholderOption);

        items.forEach((item) => {
            const option = document.createElement('option');
            option.value = item.id;
            option.textContent = item[textKey];
            if (selectedValue && String(selectedValue) === String(item.id)) {
                option.selected = true;
            }
            select.appendChild(option);
        });
    };

    const loadLineas = async (selectedLinea = '') => {
        const extrusoraId = extrusoraSelect.value;
        lineaSelect.disabled = true;
        productoSelect.disabled = true;
        setOptions(lineaSelect, [], 'Seleccionar l璯ea', '', 'nombre');
        setOptions(productoSelect, [], 'Seleccionar producto', '', 'descripcion');

        if (!extrusoraId) {
            return;
        }

        const response = await fetch(`/pricing/api/pricing/lineas/?extrusora_id=${extrusoraId}`);
        const lineas = await response.json();
        setOptions(lineaSelect, lineas, 'Seleccionar l璯ea', selectedLinea, 'nombre');
        lineaSelect.disabled = false;
    };

    const loadProductos = async (selectedProducto = '') => {
        const lineaId = lineaSelect.value;
        productoSelect.disabled = true;
        setOptions(productoSelect, [], 'Seleccionar producto', '', 'descripcion');

        if (!lineaId) {
            return;
        }

        const response = await fetch(`/pricing/api/pricing/productos/?linea_id=${lineaId}`);
        const productos = await response.json();
        setOptions(productoSelect, productos, 'Seleccionar producto', selectedProducto, 'descripcion');
        productoSelect.disabled = false;
    };

    extrusoraSelect.addEventListener('change', async () => {
        await loadLineas('');
    });

    lineaSelect.addEventListener('change', async () => {
        await loadProductos('');
    });

    const initialLinea = lineaSelect.value;
    const initialProducto = productoSelect.value;

    if (extrusoraSelect.value) {
        loadLineas(initialLinea).then(() => loadProductos(initialProducto));
    } else {
        lineaSelect.disabled = true;
        productoSelect.disabled = true;
    }
});
</script>
{% endblock %}
