{% extends 'core/base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-slate-800 tracking-tight">{{ titulo }}</h1>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6">
        <form method="post">
            {% csrf_token %}
            <div class="grid grid-cols-1 gap-6">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
                <a href="{% url 'config-productos' %}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-2xl font-semibold">Cancelar</a>
                <button type="submit" class="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white px-6 py-3 rounded-2xl font-semibold">
                    <i class="fas fa-save mr-2"></i>Guardar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const extrusoraSelect = document.getElementById('id_extrusora');
    const lineaSelect = document.getElementById('id_linea');
    const emptyOption = '<option value="">---------</option>';

    function resetSelect(selectEl, disabled = true) {
        selectEl.innerHTML = emptyOption;
        selectEl.disabled = disabled;
    }

    function populateSelect(selectEl, items, textKey, selectedId) {
        selectEl.innerHTML = emptyOption;
        items.forEach(item => {
            const option = document.createElement('option');
            option.value = item.id;
            option.textContent = item[textKey] || `ID ${item.id}`;
            if (selectedId && String(item.id) === String(selectedId)) option.selected = true;
            selectEl.appendChild(option);
        });
        selectEl.disabled = items.length === 0;
    }

    async function cargarLineas(extrusoraId, selectedLineaId) {
        resetSelect(lineaSelect, true);
        if (!extrusoraId) return;
        try {
            const data = await fetch(`/pricing/api/pricing/lineas/?extrusora_id=${extrusoraId}`).then(r => r.json());
            populateSelect(lineaSelect, data, 'nombre', selectedLineaId);
        } catch (e) {
            console.error('Error cargando líneas:', e);
        }
    }

    {% if object %}
    // Modo edición: linea ya está server-rendered con el valor correcto, solo habilitarla
    if (lineaSelect.options.length > 1) lineaSelect.disabled = false;
    {% else %}
    // Modo creación: deshabilitar linea hasta que se seleccione extrusora
    resetSelect(lineaSelect, true);
    {% endif %}

    if (extrusoraSelect) {
        extrusoraSelect.addEventListener('change', function() {
            cargarLineas(this.value);
        });
    }
});
</script>
{% endblock %}
