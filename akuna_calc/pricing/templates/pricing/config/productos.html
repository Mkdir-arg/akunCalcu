{% extends 'core/base.html' %}
{% block title %}Configuración - Productos{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold text-slate-800 mb-8">Productos</h1>
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Línea</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                {% for producto in productos %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 text-sm">{{ producto.id }}</td>
                    <td class="px-6 py-4 text-sm font-medium">{{ producto.nombre }}</td>
                    <td class="px-6 py-4 text-sm">{{ producto.linea.nombre }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">No hay productos</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
