{% extends 'core/base.html' %}
{% block title %}Configuración - Marcos{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto"><h1 class="text-3xl font-bold mb-8">Marcos</h1><div class="bg-white rounded-3xl shadow-xl overflow-hidden"><table class="min-w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th><th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nombre</th></tr></thead><tbody>{% for marco in marcos %}<tr class="hover:bg-gray-50"><td class="px-6 py-4 text-sm">{{ marco.id }}</td><td class="px-6 py-4 text-sm">{{ marco.nombre }}</td></tr>{% empty %}<tr><td colspan="2" class="px-6 py-4 text-center text-gray-500">No hay marcos</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}
